name: Deploy to Codeberg Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hakodase-codeberg-pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Publish static game
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout GitHub main
        uses: actions/checkout@v4

      - name: Validate deployment secrets
        shell: bash
        env:
          CODEBERG_USERNAME: ${{ secrets.CODEBERG_USERNAME }}
          CODEBERG_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${CODEBERG_USERNAME}" ]]; then
            echo "CODEBERG_USERNAME is not configured."
            exit 1
          fi
          if [[ -z "${CODEBERG_TOKEN}" ]]; then
            echo "CODEBERG_TOKEN is not configured."
            exit 1
          fi

      - name: Prepare public files
        shell: bash
        run: |
          set -euo pipefail
          test -f index.html
          test -d styles
          test -d src

          rm -rf _site
          mkdir -p _site
          cp index.html _site/
          cp -R styles _site/styles
          cp -R src _site/src

          echo "Files prepared for Codeberg Pages:"
          find _site -type f -print | sort

      - name: Push public files to Codeberg pages branch
        shell: bash
        env:
          CODEBERG_USERNAME: ${{ secrets.CODEBERG_USERNAME }}
          CODEBERG_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
          CODEBERG_REPOSITORY: hakodase
        run: |
          set -euo pipefail

          REMOTE="https://codeberg.org/${CODEBERG_USERNAME}/${CODEBERG_REPOSITORY}.git"
          ASKPASS="${RUNNER_TEMP}/codeberg-askpass.sh"

          cat > "${ASKPASS}" <<'SH'
          #!/bin/sh
          case "$1" in
            *Username*) printf '%s\n' "$CODEBERG_USERNAME" ;;
            *Password*) printf '%s\n' "$CODEBERG_TOKEN" ;;
          esac
          SH
          chmod 700 "${ASKPASS}"
          trap 'rm -f "${ASKPASS}"' EXIT

          rm -rf _deploy
          if GIT_ASKPASS="${ASKPASS}" GIT_TERMINAL_PROMPT=0 \
            git ls-remote --exit-code --heads "${REMOTE}" pages >/dev/null 2>&1; then
            GIT_ASKPASS="${ASKPASS}" GIT_TERMINAL_PROMPT=0 \
              git clone --depth 1 --branch pages "${REMOTE}" _deploy
          else
            mkdir -p _deploy
            git -C _deploy init
            git -C _deploy switch --orphan pages
            git -C _deploy remote add origin "${REMOTE}"
          fi

          rsync -a --checksum --delete --exclude='.git/' _site/ _deploy/

          git -C _deploy config user.name "hakodase-deploy"
          git -C _deploy config user.email "actions@users.noreply.github.com"
          git -C _deploy add -A

          if git -C _deploy diff --cached --quiet; then
            echo "Codeberg Pages is already up to date."
            exit 0
          fi

          git -C _deploy commit -m "Deploy ${GITHUB_SHA::12}"
          GIT_ASKPASS="${ASKPASS}" GIT_TERMINAL_PROMPT=0 \
            git -C _deploy push origin pages
