name: Hakodase CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: hakodase-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node-tests:
    name: Node tests and diff check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check whitespace errors
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            git diff --check "${{ github.event.pull_request.base.sha }}...HEAD"
          else
            git diff --check HEAD^..HEAD
          fi

      - name: Run Node tests
        shell: bash
        run: |
          set -o pipefail
          npm test 2>&1 | tee node-test-output.log

      - name: Upload Node evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hakodase-node-evidence-${{ github.run_attempt }}
          path: node-test-output.log
          if-no-files-found: ignore
          retention-days: 14

  browser-tests:
    name: Browser gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Run browser matrix
        run: npm run test:browser

      - name: Upload browser evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hakodase-browser-evidence-${{ github.run_attempt }}
          path: |
            playwright-report/
            test-results/browser/
          if-no-files-found: ignore
          retention-days: 14
